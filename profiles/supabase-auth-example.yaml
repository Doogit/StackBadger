# Example profile — Supabase Auth (GoTrue) + Supabase database + Supabase Storage.
#
# A full Supabase stack where Supabase Auth (GoTrue) is the identity provider,
# not just the database. This MUST be named explicitly: supabase-js statically
# bundles the GoTrue client even for database-only use, so a static bundle scan
# cannot distinguish a Supabase-Auth target from a Clerk-auth + Supabase-database
# one. Live discovery will not auto-select `supabase-auth` — declare it here.
#
# All hosts are reserved placeholders, so `--profile` runs against this file
# skip every live probe. Copy it and repoint `target.base_url` at your own site.

target:
  base_url: "https://example.com"
  api_prefix: "/api"

stack:
  auth: supabase-auth
  database: supabase
  storage: supabase

supabase:
  # project_url is required for the GoTrue sign-in adapter. It auto-discovers
  # from the target bundle; set it explicitly to override (e.g. a staging
  # project). anon_key likewise auto-discovers.
  # project_url: "https://your-project.supabase.co"
  # anon_key: "eyJhbGci..."
  storage_buckets:
    - user-files
  tables:
    user_facing:
      - documents
      - projects
    public_read_only:
      - public_posts
    service_role_only:
      - audit_log
  table_pks:
    documents: document_id
    projects: project_id

endpoints:
  authenticated:
    - path: /api/user/profile
      method: GET

test_accounts:
  user_a:
    email: "pentest-a@example.com"
  user_b:
    email: "pentest-b@example.com"

# --- OAuth delegated-send (optional) ---
# Describes a backend-for-frontend (BFF) that performs an OAuth authorization-
# code flow to obtain delegated Gmail / Microsoft Graph send access on the
# user's behalf, then sends mail server-side so the access/refresh tokens never
# reach the browser. Drives the §P1-B OAuth client-observable probes
# (state/PKCE/scope-minimisation) and the §P1-D token-storage probe.
#
# Every field is optional — each probe skips with a reason when the field it
# needs is absent. All hosts here are reserved placeholders, so live probes skip.
# Trust boundary: StackBadger probes only the CLIENT-observable controls (the app
# generates state + a PKCE code_challenge, requests minimal scopes). Authorization-
# server-owned controls (redirect-URI exact-match, auth-code single-use, PKCE
# *enforcement*) belong to Google/Microsoft and are Track-C attestation, not probes.
oauth:
  delegated_send:
    provider: google                       # google | microsoft
    # App route that initiates the flow and 302-redirects to the AS authorize
    # endpoint. The probe fetches it (no redirect-follow) and inspects the
    # Location query for state / code_challenge / scope.
    authorize_url: /api/oauth/google/authorize
    # The app's own callback route(s) registered with the AS.
    redirect_uris:
      - "https://example.com/api/oauth/google/callback"
    # The app's BFF token-exchange route, if it exposes one (server-internal).
    token_endpoint: /api/oauth/google/token
    # Scopes the app legitimately needs. The scope-minimisation probe flags an
    # authorize request that asks for more (e.g. gmail.modify or full Drive).
    required_scopes:
      - "https://www.googleapis.com/auth/gmail.send"
    # App endpoints that trigger a delegated send (token-leakage probe inspects
    # their responses for access/refresh tokens — none should appear). The
    # write-probe only fires when probe_body is set (a safe operator-controlled
    # test recipient); without it the probe skips rather than sending blind mail.
    send_endpoints:
      - path: /api/email/send
        method: POST
        # probe_body:
        #   to: "pentest-sink@example.com"
        #   subject: "stackbadger oauth token-leak probe"
        #   body: "probe"
    # Endpoints that report OAuth connection / token status (a common spot for a
    # poorly built BFF to echo a stored token back to the browser).
    status_endpoints:
      - path: /api/oauth/google/status
        method: GET

# --- Probe exclusions (optional; defaults are ALWAYS enforced) ---
# Effective list = union(your entries, built-in defaults) — an empty or absent
# list still leaves the defaults on. See exclusions.py for the default lists.
#
# exclude_paths: application-layer endpoint paths probes must never hit
# (session/state-destroying: /logout, /signout, /delete-account,
# /reset-password, token-rotation paths, ...). Path-prefix, case-insensitive,
# segment-boundary matched. NOTE: this covers endpoint paths ONLY — it does
# NOT cover PostgREST table probes (/rest/v1/<table>?id=eq.<uuid>); those are
# driven by supabase.tables and gated by exclude_tables.
# exclude_paths:
#   - /admin/reset-demo
#
# exclude_tables: table names (as listed under supabase.tables) to skip in the
# PostgREST/IDOR table enumeration. Exact-name, case-insensitive.
# exclude_tables:
#   - dangerous_audit_table

# --- Auth verify_path (optional fast-fail) ---
# An API-LAYER route that returns 401/403 to unauthenticated callers and 2xx
# to a signed-in account (a PostgREST table read, an auth-checked function or
# API route). After sign-in, run.sh and doctor.py request it with EACH
# account's credential and abort on 401/403 — failing fast on a wrong
# stack.auth adapter or a dead account instead of 50 skipped tests later.
# Do NOT point it at an app PAGE: CDN-cached pages return 200 to anonymous
# callers and check auth client-side, which verifies nothing. Unset (the
# default) -> the check is skipped with a warning (black-box safe). The path
# is ROOT-relative: it resolves against the target ORIGIN (any path prefix
# on base_url is ignored).
# auth:
#   verify_path: /api/user/profile
