# ASVS 5.0 expected-controls manifest for StackBadger's black-box harness.
#
# SOURCE: casa-asvs-readiness-plan.md §P1/§P2 (probe specs) + asvs-5.0-audit.md
# (coverage matrix). Both source docs live under docs/plans/, which is gitignored
# / local-only, so this file is the committed, CI-visible transcription of the
# controls this harness ASSERTS it addresses. Curated 2026-07-03.
#
# WHY THIS FILE EXISTS: the coverage ledger (reports/ledger.py) joins per-probe
# @pytest.mark.asvs("<id>") tags to run outcomes, so it can only classify a
# control that has at least one tagged pytest node. Two states it cannot express
# from tags alone are computed by set-difference against this manifest
# (reports/manifest.py):
#   - not_covered    : a control the harness asserts it should probe, but which
#                      has zero tagged nodes (probe never written or tag dropped
#                      -- a coverage regression).
#   - not_applicable : a control deliberately excluded by written justification.
#
# ID FORMAT: keys match the @pytest.mark.asvs("<id>") tag form -- dotted, no "V"
# prefix (e.g. "7.2.4", not "V7.2.4"). n-a exclusions are kept at the granularity
# the source docs justify (chapter/section) rather than inventing sub-ids.
#
# HONEST/BOUNDED: this is a curated, defensible subset of ASVS 5.0 -- the
# black-box-observable controls StackBadger asserts it addresses over the wire,
# plus the named exclusions -- NOT the full ~350-requirement standard. A skip is
# NOT coverage: a control whose only probes skipped carries the ledger's own
# "skipped" status, never "covered".
#
# Each entry has:
#   status : "expected" (a black-box probe should exercise it) or "n-a"
#            (justified out-of-scope for this harness).
#   note   : one-line justification / probe pointer, required for EVERY entry.

